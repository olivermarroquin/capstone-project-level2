<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Assistant | Next Chapter Books</title>
    <link rel="stylesheet" href="css/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/books.js" defer></script>
    <script src="js/chat.js" defer></script>
  </head>
  <body class="bg-gray-200 text-gray-700">
    <header class="bg-white shadow-md">
      <nav class="max-w-6xl mx-auto flex justify-between items-center p-4">
        <h1 class="text-xl font-bold">Next Chapter Books</h1>
        <ul class="flex gap-6 text-sm font-medium">
          <li><a href="index.html" class="hover:text-blue-600">Home</a></li>
          <li>
            <a href="catalog.html" class="hover:text-blue-600">Catalog</a>
          </li>
          <li>
            <a href="chat.html" class="hover:text-blue-600">Book Assistant</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section>
        <h2 class="text-lg font-semibold mb-2 p-2">Ask the Book Assistant</h2>
        <p class="ml-2 mb-2">
          Ask aboout authors, genres, prices, descriptions, or which book might
          fit your interests.
        </p>
        <!-- output: dom anchor for js -->
        <div
          id="output"
          class="bg-white p-4 rounded-lg shadow-md h-80 overflow-y-auto mb-4"
        ></div>
        <form id="inputArea" class="flex gap-2">
          <label for="prompt" class="p-2 ml-2 font-semibold"
            >Your Question:</label
          >
          <input
            type="text"
            id="prompt"
            placeholder="Which fantasy book do you have?"
            class="flex-1 border rounded-md p-2"
          />
          <button
            type="submit"
            class="bg-blue-600 text-white px-4 rounded-md hover:bg-blue-700 mr-2"
          >
            Send
          </button>
        </form>
        <p id="chatStatus" class="m-6"></p>
      </section>
    </main>
    <footer class="m-6 mx-12 mt-20">&copy; 2026 Next Chapter Books</footer>
  </body>
</html>
