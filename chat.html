<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Assistant | Next Chapter Books</title>
    <link rel="stylesheet" href="css/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/books.js" defer></script>
    <script src="js/chat.js" defer></script>
  </head>
  <body class="bg-gray-200 text-gray-700">
    <header class="bg-white shadow-md">
      <nav class="max-w-6xl mx-auto flex justify-between items-center p-4">
        <h1 class="text-xl font-bold">Next Chapter Books</h1>
        <ul class="flex gap-6 text-sm font-medium">
          <li><a href="index.html" class="hover:text-blue-600">Home</a></li>
          <li>
            <a href="catalog.html" class="hover:text-blue-600">Catalog</a>
          </li>
          <li>
            <a href="chat.html" class="hover:text-blue-600">Book Assistant</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section>
        <h2>Ask the Book Assistant</h2>
        <p>
          Ask aboout authors, genres, prices, descriptions, or which book might
          fit your interests.
        </p>
        <!-- output: dom anchor for js -->
        <div id="output" class="bg-white p-4 rounded-lg"></div>
        <form id="inputArea">
          <label for="prompt">Your question</label>
          <input
            type="text"
            id="prompt"
            placeholder="Which fantasy book do you have?"
          />
          <button type="submit">Send</button>
        </form>
        <p id="chatStatus"></p>
      </section>
    </main>
    <footer>&copy; 2026 Next Chapter Books</footer>
  </body>
</html>
