<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Catalog | Newt Chapter Books</title>
    <link rel="stylesheet" href="css/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/books.js" defer></script>
    <script src="js/catalog.js" defer></script>
  </head>
  <body class="bg-gray-200 text-gray-700">
    <header class="bg-white shadow-md">
      <nav class="max-w-6xl mx-auto flex justify-between items-center p-4">
        <h1 class="text-xl font-bold">Next Chapter Books</h1>
        <ul class="flex gap-6 text-sm font-medium">
          <li><a href="index.html" class="hover:text-blue-600">Home</a></li>
          <li>
            <a href="catalog.html" class="hover:text-blue-600">Catalog</a>
          </li>
          <li>
            <a href="chat.html" class="hover:text-blue-600">Book Assistant</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section>
        <h2>Browse Our Catalog</h2>
        <form id="filterForm" class="flex flex-wrap gap-4 items-end mb-6">
          <label for="genreSelect">Genre</label>
          <select id="genreSelect" class="border rounded-md p-2">
            <option value="All">All</option>
            <option value="Self-Help">Self-Help</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Productivity">Productivity</option>
            <option value="Science Fiction">Science Fiction</option>
            <option value="Classic">Classic</option>
            <option value="Thriller">Thriller</option>
          </select>
          <label for="searchInput">Search</label>
          <input
            type="text"
            id="searchInput"
            placeholder="Search by title or author"
            class="border rounded-md p-2"
          />
          <button
            type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700"
          >
            Search
          </button>
        </form>
        <p id="catalogStatus"></p>
        <!-- catalogBooks: dom anchor for js -->
        <div id="catalogBooks"></div>
      </section>
    </main>
    <footer>
      <p>&copy; 2026 Next Chapter Books</p>
    </footer>
  </body>
</html>
